overwrite: true
generates:
  ./src/gen/graphql.ts:
    schema: '../library-api/schema.graphql'
    documents: './src/**/*.graphql'
    plugins:
      - typescript
      - typescript-operations
      - typescript-graphql-request
      - typescript-validation-schema
      - add:
          content: "// @ts-nocheck"
config:
  schema: zod
  notAllowEmptyString: true
  concurrency: 1
