server:
  binary: library-api
  address: 0.0.0.0:50063
  health_check:
    path: /health
    timeout_seconds: 60
    interval_seconds: 2

dependencies:
  database_url: mysql://root:@localhost:15000/library
  database_root_url: mysql://root:@localhost:15000
  auth_database_url: mysql://root:@localhost:15000/tachyon_apps_auth
  database_manager_url: mysql://root:@localhost:15000/tachyon_apps_database_manager
  # library-api runs on a fixed platform (Library Sandbox)
  root_id: tn_01j702qf86pc2j35s0kv0gv3gy
  additional_env:
    AWS_EC2_METADATA_DISABLED: "true"
    ENVIRONMENT: test
    PORT: "50063"
    COGNITO_JWK_URL: https://cognito-idp.ap-northeast-1.amazonaws.com/your-cognito-user-pool-id/.well-known/jwks.json
    LIBRARY_TENANT_ID: tn_01j702qf86pc2j35s0kv0gv3gy
    DATABASE_URL: mysql://root:@localhost:15000/library
    AUTH_DATABASE_URL: mysql://root:@localhost:15000/tachyon_apps_auth
    PROCESS_MANAGER_DATABASE_URL: mysql://root:@localhost:15000/tachyon_apps_process_manager
    DB_MANAGER_DATABASE_URL: mysql://root:@localhost:15000/tachyon_apps_database_manager
    LIBRARY_DATABASE_URL: mysql://root:@localhost:15000/library

tachyon_api:
  binary: tachyon-api
  address: 127.0.0.1:50050
  health_path: /
  health_timeout_seconds: 60
  health_interval_seconds: 2
  env:
    DATABASE_URL: mysql://root:@localhost:15000
    AUTH_DATABASE_URL: mysql://root:@localhost:15000/tachyon_apps_auth
    PAYMENT_DATABASE_URL: mysql://root:@localhost:15000/tachyon_apps_payment
    DB_MANAGER_DATABASE_URL: mysql://root:@localhost:15000/tachyon_apps_database_manager
    ENVIRONMENT: test
    PORT: "50050"
    ROOT_ID: tn_01hjryxysgey07h5jz5wagqj0m
    COGNITO_JWK_URL: https://cognito-idp.ap-northeast-1.amazonaws.com/your-cognito-user-pool-id/.well-known/jwks.json
    COGNITO_USER_POOL_ID: your-cognito-user-pool-id
    AWS_EC2_METADATA_DISABLED: "true"
    PAYMENT_SKIP_BILLING: "true"
    USE_MOCK_LLM_PROVIDER: "true"

report:
  enabled: true
  api_key: dummy-token
  operator_id: tn_01hjryxysgey07h5jz5wagqj0m

logging:
  forward_stdout: false
  forward_stderr: false

scenario:
  default_base_url: http://localhost:50063
  allow_cli_override: true
  include: []
