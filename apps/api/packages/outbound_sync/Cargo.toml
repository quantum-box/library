[package]
name = "outbound_sync"
version = "0.1.0"
edition = "2021"
description = "Outbound data synchronization engine for database context"

[dependencies]
outbound_sync_domain = { path = "domain" }
errors = { path = "../../../../packages/errors" }
value_object = { path = "../../../../packages/value_object" }
tachyon-sdk = { path = "../../../../sdk/rust", features = ["auth"] }

async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
derive-new = "0.6"
derive-getters = "0.4"
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["mysql", "runtime-tokio", "chrono"] }
thiserror = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
base64 = "0.22"
similar = "2"

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
