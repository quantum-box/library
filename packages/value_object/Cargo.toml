[package]
name = "value_object"
version = "0.1.0"
edition = "2021"

[features]
default = ["async-graphql", "sqlx"]
async-graphql = ["dep:async-graphql"]
sqlx = ["dep:sqlx", "util/sqlx", "errors/sqlx"]
axum = ["dep:axum", "dep:utoipa", "serde"]
# serde = ["dep:serde", "dep:serde_json"]
serde = []

[dependencies]
util = { path = "../util", default-features = false }
errors = { path = "../errors", default-features = false }

anyhow = { workspace = true }
chrono = { workspace = true }

# serde
serde = { workspace = true }
serde_json = { workspace = true }

smart-default = { workspace = true }
smol_str = { workspace = true }
sqlx = { workspace = true, optional = true }
rust-i18n = { workspace = true }
async-trait = { workspace = true }
derive-getters = { workspace = true }
strum = { workspace = true }
strum_macros = { workspace = true }
url = { workspace = true }
bytes = { workspace = true }

ulid = { version = "0.4.1", features = ["serde"] }
axum = { workspace = true, optional = true }
utoipa = { workspace = true, optional = true }

rust_decimal = { workspace = true }
sha2 = { workspace = true }

email_address = "0.2.4"
num = { workspace = true }
mockall = { workspace = true }
async-graphql = { workspace = true, optional = true }
thiserror = { workspace = true }

[dev-dependencies]
rstest = { workspace = true }
pretty_assertions = { workspace = true }
rust_decimal_macros = { workspace = true }